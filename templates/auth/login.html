{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5SiTrec – Autentificare</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div style="margin-bottom:28px;">
      <div style="font-size:24px;font-weight:800;color:var(--charcoal);letter-spacing:-0.5px;">
        5Si<span style="color:var(--mint-dark)">Trec</span>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">tracker academic personal</div>
    </div>
    <div class="auth-title">Bun venit!</div>
    <div class="auth-subtitle">Autentifică-te pentru a accesa tracker-ul tău.</div>

    {% if form.errors %}
    <div class="alert alert-danger" style="margin-bottom:16px;">
      Utilizator sau parolă incorecte.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Utilizator</label>
        <input type="text" name="username" class="form-control" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Parolă</label>
        <input type="password" name="password" class="form-control" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px;">
        Intră în cont
      </button>
    </form>

    <div style="margin-top:20px;text-align:center;font-size:13px;color:var(--text-muted);">
      Nu ai cont?
      <a href="{% url 'register' %}" style="color:var(--mint-dark);font-weight:600;text-decoration:none;">Înregistrează-te</a>
    </div>
  </div>
</div>
</body>
</html>
